<script>
function myTime(){
    var myDate = new Date();
    var hr = myDate.getHours();
    var min = (myDate.getMinutes()<10) ? "0" + myDate.getMinutes() : myDate.getMinutes();
    var sec = (myDate.getSeconds()<10) ? "0" + myDate.getSeconds() : myDate.getSeconds();

    // AM/PM check
    var M = (hr >= 12) ? "PM" : "AM";

    // 12-hour format convert
    hr = (hr % 12) || 12;
    hr = (hr < 10) ? "0" + hr : hr;

    document.querySelector(".h").textContent = hr;
    document.querySelector(".m").textContent = ":" + min;
    document.querySelector(".date").textContent = ":" + sec + " " + M;
}
